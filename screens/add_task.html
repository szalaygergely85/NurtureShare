<script>
        function selectAssign(element) {
            const buttons = document.querySelectorAll('.assign-btn');
            const pill = document.getElementById('assign-pill');
            const index = Array.from(buttons).indexOf(element);
            pill.style.left = `calc(${(index * 33.33) + 0.5}%)`;
            buttons.forEach(btn => {
                btn.classList.remove('text-primary', 'font-bold');
                btn.classList.add('text-on-surface-variant');
            });
            element.classList.add('text-primary', 'font-bold');
            element.classList.remove('text-on-surface-variant');
        }
        const inputs = document.querySelectorAll('input, textarea');
        inputs.forEach(input => {
            input.addEventListener('focus', () => input.parentElement.querySelector('label')?.classList.add('text-primary'));
            input.addEventListener('blur', () => input.parentElement.querySelector('label')?.classList.remove('text-primary'));
        });
    </script>
